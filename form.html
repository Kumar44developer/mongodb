<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <h1 class="form-title">Student Registration</h1>
            <form id="registrationForm" class="registration-form">
                <div class="form-group">
                    <label for="regdNo" class="form-label">Registration Number <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="regdNo" 
                        name="regdNo" 
                        class="form-input" 
                        placeholder="Enter your registration number"
                        required
                    >
                    <span class="error-message" id="regdNoError"></span>
                </div>

                <div class="form-group">
                    <label for="name" class="form-label">Name <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        class="form-input" 
                        placeholder="Enter your full name"
                        required
                    >
                    <span class="error-message" id="nameError"></span>
                </div>


                <div class="form-group">
                    <label for="email" class="form-label">Email <span class="required">*</span></label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="Enter your email address"
                        required
                    >
                    <span class="error-message" id="emailError"></span>
                </div>


                <div class="form-group">
                    <label for="branch" class="form-label">Branch <span class="required">*</span></label>
                    <select 
                        id="branch" 
                        name="branch" 
                        class="form-input form-select" 
                        required
                    >
                        <option value="">Select a branch</option>
                        <option value="CSE">Computer Science Engineering (CSE)</option>
                        <option value="ECE">Electronics and Communication (ECE)</option>
                        <option value="ME">Mechanical Engineering (ME)</option>
                        <option value="CE">Civil Engineering (CE)</option>
                        <option value="EEE">Electrical and Electronics (EEE)</option>
                    </select>
                    <span class="error-message" id="branchError"></span>
                </div>



                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">Submit</span>
                    <span class="btn-loader" id="btnLoader" style="display: none;">
                        <span class="spinner"></span>
                    </span>
                </button>


                <div class="success-message" id="successMessage" style="display: none;">
                    ✓ Registration successful! Your data has been saved.
                </div>


                <div class="error-banner" id="errorBanner" style="display: none;">
                    <span id="errorBannerText"></span>
                </div>
            </form>
